<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OTP system</title>
        <link rel="stylesheet" href="./css/styles.css">
        <script src="./js/script.js"></script>
    </head>
    <body>
        <div class="container">
            <h1 class="header">Authenticate yourself</h1>
            <label for="email" >Enter your email:</label>
            <input type="email" id="email" placeholder="Enter email please" autocomplete="on">
            <button onclick="generateOTP()">Generate OTP</button>
            <br>
            <input type="text" name="v1" class="boxes" maxlength="1">
            <input type="text" name="v2" class="boxes" maxlength="1">
            <input type="text" name="v3" class="boxes" maxlength="1">
            <input type="text" name="v4" class="boxes" maxlength="1">
            <button onclick="verifyOTP()">Verify OTP</button>
            <pre>
            <p class="message" id="response"></p>
            </pre>
        </div>
    </body>
</html>
